<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Detail Surah - Imanify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0B1E1C; 
            color: #FFFFFF;
        }
        .font-arabic {
            font-family: 'Amiri', serif;
            line-height: 2.5rem;
        }
        .glass-card {
            background: rgba(15, 118, 110, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .glass-nav {
            background: rgba(11, 30, 28, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>

    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold tracking-wider text-white">Iman<span class="text-[#D4AF37]">ify</span></span>
        </div>
        <div>
            <a href="quran.html" class="text-xs bg-[#0F766E] text-white px-4 py-2 rounded-xl font-medium hover:bg-[#115e56] transition inline-flex items-center gap-1">
                &larr; Kembali ke List
            </a>
        </div>
    </nav>

    <main class="pt-32 pb-24 px-6 max-w-4xl mx-auto min-h-screen">
        <div id="header-surah" class="glass-card rounded-2xl p-6 text-center mb-8 border border-[#D4AF37]/30">
            <h1 id="surah-title" class="text-2xl md:text-4xl font-bold mb-1 text-[#D4AF37]">-</h1>
            <p id="surah-subtitle" class="text-xs md:text-sm text-gray-400 mb-4">-</p>
            
            <div class="max-w-xs mx-auto bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col gap-2">
                <span class="text-[10px] text-gray-400 font-medium tracking-wider uppercase">Dengarkan Murottal</span>
                <audio id="surah-audio" controls class="w-full h-8 mt-1 accent-[#D4AF37]"></audio>
            </div>
        </div>

        <div id="container-ayat" class="space-y-6">
            <p class="text-sm text-gray-400 text-center py-10 animate-pulse">Memuat lantunan ayat suci...</p>
        </div>
    </main>

    <footer class="border-t border-gray-800 bg-[#071413] py-8 px-6 text-center text-xs text-gray-500">
        <p>&copy; 2026 Imanify Platform. All rights reserved.</p>
    </footer>

    <script>
        // Mengambil id surah dari parameter URL (?surah=X)
        const urlParams = new URLSearchParams(window.location.search);
        const nomorSurah = urlParams.get('surah');

        async function loadDetailSurah() {
            if(!nomorSurah) {
                document.getElementById('container-ayat').innerHTML = `<p class="text-sm text-red-400 text-center">Nomor surah tidak valid.</p>`;
                return;
            }

            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomorSurah}`);
                const json = await res.json();

                if (json.code === 200) {
                    const data = json.data;

                    // Mengisi info header surah
                    document.getElementById('surah-title').innerText = `${data.namaLatin} (${data.nama})`;
                    document.getElementById('surah-subtitle').innerText = `${data.arti} • ${data.tempatTurun} • ${data.jumlahAyat} Ayat`;
                    
                    // Set audio surah (pilihan Qari teratas)
                    const audioUrl = data.audioFull["01"] || data.audioFull["02"];
                    document.getElementById('surah-audio').src = audioUrl;

                    // Render Daftar Ayat
                    const containerAyat = document.getElementById('container-ayat');
                    containerAyat.innerHTML = '';

                    // Menampilkan Bismillah jika bukan At-Taubah
                    if (data.nomor !== 1 && data.nomor !== 9) {
                        const bismillahCard = document.createElement('div');
                        bismillahCard.className = "text-center font-arabic text-2xl text-white py-4 tracking-wide";
                        bismillahCard.innerText = "بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ";
                        containerAyat.appendChild(bismillahCard);
                    }

                    data.ayat.forEach(ay => {
                        const ayatCard = document.createElement('div');
                        ayatCard.className = "glass-card p-6 rounded-2xl border border-white/5 space-y-4";
                        
                        ayatCard.innerHTML = `
                            <div class="flex justify-between items-start gap-4">
                                <div class="w-7 h-7 bg-[#D4AF37]/20 text-[#D4AF37] border border-[#D4AF37]/30 text-xs font-bold rounded-full flex items-center justify-center shrink-0">
                                    ${ay.nomorAyat}
                                </div>
                                <p class="font-arabic text-2xl md:text-3xl text-white text-right leading-loose tracking-wide w-full">
                                    ${ay.teksArab}
                                </p>
                            </div>
                            <div class="pt-2 border-t border-white/5 space-y-1">
                                <p class="text-xs text-emerald-400 italic">${ay.teksLatin}</p>
                                <p class="text-xs md:text-sm text-gray-300 leading-relaxed">${ay.teksIndonesia}</p>
                            </div>
                        `;
                        containerAyat.appendChild(ayatCard);
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('container-ayat').innerHTML = `<p class="text-xs text-gray-400 text-center">Gagal memuat ayat. Periksa koneksi internet Anda.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadDetailSurah);
    </script>
</body>
</html>
