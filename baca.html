<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membaca Al-Qur'an - Imanify</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0B1E1C; 
            color: #FFFFFF;
        }
        .font-arabic {
            font-family: 'Amiri', serif;
            line-height: 2.5;
        }
        .glass-card {
            background: rgba(15, 118, 110, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.12);
        }
        .glass-nav {
            background: rgba(11, 30, 28, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 py-4 px-6 md:px-12 flex justify-between items-center">
        <a href="quran.html" class="text-xs bg-[#0F766E]/30 border border-[#D4AF37]/40 text-[#D4AF37] px-4 py-2 rounded-xl hover:bg-[#0F766E] hover:text-white transition">
            ← Kembali ke Daftar Surah
        </a>
        <span class="text-xl font-bold tracking-wider text-white">Iman<span class="text-[#D4AF37]">ify</span></span>
    </nav>

    <section class="pt-32 pb-8 px-6 max-w-4xl mx-auto text-center border-b border-white/5">
        <h1 id="nama-surah" class="text-3xl md:text-4xl font-bold text-[#D4AF37] mb-2">Memuat...</h1>
        <p id="info-surah" class="text-gray-400 text-xs md:text-sm uppercase tracking-widest mb-6">Memuat Informasi Surah</p>
        
        <div class="inline-flex items-center gap-3 bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl">
            <button id="btn-audio" class="w-9 h-9 bg-[#0F766E] hover:bg-[#139288] text-white rounded-full flex items-center justify-center text-sm transition focus:outline-none shadow-md">
                ▶
            </button>
            <div class="text-left">
                <span class="text-xs font-medium block text-white">Murottal Surah</span>
                <span id="status-audio" class="text-[10px] text-gray-400 block">Audio terjeda</span>
            </div>
        </div>
    </section>

    <main id="container-ayat" class="px-6 md:px-12 max-w-4xl mx-auto py-12 space-y-8">
        <p class="text-sm text-gray-400 text-center animate-pulse">Memuat lembaran ayat suci...</p>
    </main>

    <script>
        // 1. Tangkap parameter nomor surah dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const nomorSurah = urlParams.get('surah') || '1';

        let audioPlayer = new Audio();
        let audioUrl = '';

        async function loadDetailSurah() {
            const container = document.getElementById('container-ayat');
            const titleH1 = document.getElementById('nama-surah');
            const infoP = document.getElementById('info-surah');

            try {
                // Ambil data lengkap ayat berdasarkan nomor surah
                const res = await fetch(`https://equran.id/api/v2/surat/${nomorSurah}`);
                const json = await res.json();

                if (json.code === 200) {
                    const data = json.data;
                    
                    // Set judul header dan siapkan audio murottal opsionalnya
                    titleH1.innerText = data.namaLatin;
                    infoP.innerText = `${data.arti} • ${data.tempatTurun} • ${data.jumlahAyat} Ayat`;
                    audioUrl = data.audioFull["01"];

                    container.innerHTML = '';

                    // Munculkan Bismillah di awal surah jika bukan Al-Fatihah / At-Taubah
                    if (nomorSurah !== '1' && nomorSurah !== '9') {
                        container.innerHTML = `
                            <div class="text-center py-6 border-b border-white/5">
                                <p class="font-arabic text-2xl text-[#D4AF37]">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
                            </div>
                        `;
                    }

                    // Looping cetak seluruh ayat beserta nomor dan artinya
                    data.ayat.forEach(ay => {
                        const ayatRow = document.createElement('div');
                        ayatRow.className = "glass-card p-6 rounded-2xl space-y-4 hover:border-[#D4AF37]/30 transition";
                        
                        ayatRow.innerHTML = `
                            <div class="flex justify-between items-start gap-4">
                                <div class="w-7 h-7 min-w-[28px] rounded-lg bg-[#0F766E]/20 border border-[#D4AF37]/30 flex items-center justify-center text-[11px] font-bold text-[#D4AF37]">
                                    ${ay.nomorAyat}
                                </div>
                                <div class="text-right w-full">
                                    <p class="font-arabic text-2xl md:text-3xl text-white tracking-wide">${ay.teksArab}</p>
                                </div>
                            </div>
                            <div class="pt-2 border-t border-white/5">
                                <p class="text-xs italic text-emerald-400/90 mb-1">${ay.teksLatin}</p>
                                <p class="text-xs text-gray-300 leading-relaxed">${ay.teksIndonesia}</p>
                            </div>
                        `;
                        container.appendChild(ayatRow);
                    });
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-xs text-gray-400 text-center">Gagal memuat ayat. Cek koneksi internet.</p>`;
            }
        }

        // 2. Mengatur Kontrol Player Audio Murottal Opsional
        const btnAudio = document.getElementById('btn-audio');
        const statusAudio = document.getElementById('status-audio');

        if (btnAudio && statusAudio) {
            btnAudio.addEventListener('click', () => {
                if (!audioUrl) return;

                if (audioPlayer.src !== audioUrl) {
                    audioPlayer.src = audioUrl;
                }

                if (audioPlayer.paused) {
                    audioPlayer.play();
                    btnAudio.innerHTML = "⏸";
                    statusAudio.innerText = "Murottal sedang diputar...";
                    statusAudio.className = "text-[10px] text-emerald-400 block animate-pulse";
                } else {
                    audioPlayer.pause();
                    btnAudio.innerHTML = "▶";
                    statusAudio.innerText = "Audio terjeda";
                    statusAudio.className = "text-[10px] text-gray-400 block";
                }
            });

            // Reset tombol saat audio selesai berputar
            audioPlayer.addEventListener('ended', () => {
                btnAudio.innerHTML = "▶";
                statusAudio.innerText = "Audio selesai";
                statusAudio.className = "text-[10px] text-gray-400 block";
            });
        }

        window.addEventListener('DOMContentLoaded', loadDetailSurah);
    </script>
</body>
</html>
