<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar - Imanify</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0B1E1C;
            color: #FFFFFF;
        }
        .glass-card {
            background: rgba(15, 118, 110, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-6">

    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[#0F766E]/20 rounded-full blur-2xl -z-10"></div>
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-wider text-white">Iman<span class="text-[#D4AF37]">ify</span></h1>
            <p id="auth-subtitle" class="text-gray-400 text-xs mt-1">Silakan masuk untuk mengakses fitur penuh</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-300 mb-1.5">Nama Pengguna (Username)</label>
                <input id="auth-username" type="text" placeholder="Masukkan username..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-[#D4AF37]">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-300 mb-1.5">Kata Sandi (Password)</label>
                <input id="auth-password" type="password" placeholder="Masukkan password..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-[#D4AF37]">
            </div>

            <button id="btn-auth-primary" class="w-full bg-[#0F766E] hover:bg-[#115e56] text-white text-xs font-semibold py-3 rounded-xl transition pt-4">
                Masuk Sekarang
            </button>
            
            <div class="text-center pt-2">
                <button id="btn-toggle-mode" class="text-[11px] text-gray-400 hover:text-[#D4AF37] transition">
                    Belum punya akun? <span class="text-[#D4AF37] font-semibold">Daftar di sini</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        const authSubtitle = document.getElementById('auth-subtitle');
        const btnAuthPrimary = document.getElementById('btn-auth-primary');
        const btnToggleMode = document.getElementById('btn-toggle-mode');
        const usernameInput = document.getElementById('auth-username');
        const passwordInput = document.getElementById('auth-password');

        // Ganti mode antara LOGIN dan REGISTER
        btnToggleMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authSubtitle.innerText = "Silakan masuk untuk mengakses fitur penuh";
                btnAuthPrimary.innerText = "Masuk Sekarang";
                btnToggleMode.innerHTML = `Belum punya akun? <span class="text-[#D4AF37] font-semibold">Daftar di sini</span>`;
            } else {
                authSubtitle.innerText = "Buat akun baru untuk memulai tracking ibadah";
                btnAuthPrimary.innerText = "Daftar Akun Baru";
                btnToggleMode.innerHTML = `Sudah punya akun? <span class="text-[#D4AF37] font-semibold">Masuk di sini</span>`;
            }
        });

        // Proses Tombol Submit Klik
        btnAuthPrimary.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                alert("Harap isi semua kolom terlebih dahulu!");
                return;
            }

            // Ambil database user lokal yang tersimpan
            let users = JSON.parse(localStorage.getItem('imanify_users')) || {};

            if (isLoginMode) {
                // LOGIKA MASUK (LOGIN)
                if (users[username] && users[username] === password) {
                    localStorage.setItem('imanify_session', username); // Simpan sesi aktif
                    alert("Selamat datang kembali, " + username + "!");
                    window.location.href = "index.html?login=success"; // Alihkan ke beranda
                } else {
                    alert("Username atau password salah. Silakan periksa kembali.");
                }
            } else {
                // LOGIKA DAFTAR (REGISTER)
                if (users[username]) {
                    alert("Username ini sudah terdaftar! Gunakan nama lain.");
                } else {
                    users[username] = password;
                    localStorage.setItem('imanify_users', JSON.stringify(users));
                    alert("Akun berhasil dibuat! Silakan masuk.");
                    btnToggleMode.click(); // Kembalikan ke mode login otomatis
                }
            }
        });
    </script>
</body>
</html>
